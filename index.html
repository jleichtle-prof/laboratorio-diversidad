<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laboratorio de Biodiversidad</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f7f4;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#2e7d32;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.species{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
}

button{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
}

.plus{
    background:#4caf50;
    color:white;
}

.minus{
    background:#f44336;
    color:white;
}

.resultado{
    text-align:center;
    font-size:1.2em;
    margin-top:20px;
}

.indice{
    font-size:1.5em;
    color:#1565c0;
    font-weight:bold;
}

.mensaje{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🌿 Laboratorio de Biodiversidad Chilena</h1>

<div class="card">

<div class="species">
<span>🦊 Culpeo</span>
<div>
<button class="minus" onclick="cambiar('culpeo',-1)">-</button>
<span id="culpeo">5</span>
<button class="plus" onclick="cambiar('culpeo',1)">+</button>
</div>
</div>

<div class="species">
<span>🐭 Degú</span>
<div>
<button class="minus" onclick="cambiar('degu',-1)">-</button>
<span id="degu">5</span>
<button class="plus" onclick="cambiar('degu',1)">+</button>
</div>
</div>

<div class="species">
<span>🦉 Tucúquere</span>
<div>
<button class="minus" onclick="cambiar('tucuquere',-1)">-</button>
<span id="tucuquere">5</span>
<button class="plus" onclick="cambiar('tucuquere',1)">+</button>
</div>
</div>

<div class="species">
<span>🦎 Lagarto</span>
<div>
<button class="minus" onclick="cambiar('lagarto',-1)">-</button>
<span id="lagarto">5</span>
<button class="plus" onclick="cambiar('lagarto',1)">+</button>
</div>
</div>

<div class="species">
<span>🐇 Liebre</span>
<div>
<button class="minus" onclick="cambiar('liebre',-1)">-</button>
<span id="liebre">5</span>
<button class="plus" onclick="cambiar('liebre',1)">+</button>
</div>
</div>

</div>

<div class="card resultado">

<div>
Shannon:
<div id="shannon" class="indice"></div>
</div>

<br>

<div>
Simpson:
<div id="simpson" class="indice"></div>
</div>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

function cambiar(especie,valor){

let elemento=document.getElementById(especie);
let actual=parseInt(elemento.innerText);

actual+=valor;

if(actual<0){
actual=0;
}

elemento.innerText=actual;

calcular();
}

function calcular(){

let especies=[
parseInt(document.getElementById("culpeo").innerText),
parseInt(document.getElementById("degu").innerText),
parseInt(document.getElementById("tucuquere").innerText),
parseInt(document.getElementById("lagarto").innerText),
parseInt(document.getElementById("liebre").innerText)
];

let N=especies.reduce((a,b)=>a+b,0);

if(N===0){
return;
}

let H=0;
let D=0;

especies.forEach(n=>{

if(n>0){

let p=n/N;

H -= p*Math.log(p);

D += p*p;

}

});

let simpson=1-D;

document.getElementById("shannon").innerText=H.toFixed(3);
document.getElementById("simpson").innerText=simpson.toFixed(3);

let mensaje="";

if(H>1.5){
mensaje="✅ Diversidad alta";
}
else if(H>1){
mensaje="🟡 Diversidad moderada";
}
else{
mensaje="🔴 Diversidad baja";
}

document.getElementById("mensaje").innerText=mensaje;

}

calcular();

</script>

</body>
</html>
